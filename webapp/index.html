<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>StakeMate</title>
  <link rel="preconnect" href="https://telegram.org" crossorigin />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/app/style.css?v=20260430-3" />
</head>
<body>
  <div id="app" data-view="dashboard">
    <header class="topbar">
      <button class="iconbtn back" aria-label="Back" data-action="back">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path fill="currentColor" d="M14.7 5.3a1 1 0 0 1 0 1.4L9.4 12l5.3 5.3a1 1 0 0 1-1.4 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.4 0z"/>
        </svg>
      </button>
      <div class="title">
        <strong id="topbar-title" data-i18n="webapp_topbar_portfolio">Portfolio</strong>
        <span id="topbar-sub" class="muted small"></span>
      </div>
      <button class="textbtn" aria-label="Settings" data-action="settings">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <!-- Three horizontal sliders — reads as "settings/preferences"
               more obviously than a gear in mobile-app conventions. -->
          <path fill="currentColor" d="M3 6h11a3 3 0 0 0 6 0h1a1 1 0 0 0 0-2h-1a3 3 0 0 0-6 0H3a1 1 0 0 0 0 2zm18 5h-7a3 3 0 0 0-6 0H3a1 1 0 0 0 0 2h5a3 3 0 0 0 6 0h7a1 1 0 0 0 0-2zm0 7h-1a3 3 0 0 0-6 0H3a1 1 0 0 0 0 2h11a3 3 0 0 0 6 0h1a1 1 0 0 0 0-2z"/>
        </svg>
        <span data-i18n="webapp_settings_btn">Settings</span>
      </button>
    </header>

    <main id="main">
      <!-- Views render here -->
      <section id="view" class="view"></section>
    </main>
  </div>

  <template id="tpl-dashboard">
    <div class="hero">
      <div class="hero-row">
        <div>
          <div class="muted small" data-i18n="webapp_dashboard_total_stake">Total stake</div>
          <div class="hero-value" data-bind="totalStakePrimary">—</div>
          <div class="hero-sub muted small" data-bind="totalStakeSecondary"></div>
        </div>
        <div>
          <div class="muted small" data-i18n="webapp_unclaimed_label">Unclaimed</div>
          <div class="hero-value" data-bind="totalUnclaimedPrimary">—</div>
          <div class="hero-sub muted small" data-bind="totalUnclaimedSecondary"></div>
        </div>
      </div>
      <div class="hero-meta">
        <span class="chip" data-bind="epochChip">epoch —</span>
        <span class="chip" data-bind="countsChip">— validators · — delegations</span>
      </div>
      <div class="epoch-progress" data-bind="epochProgress" hidden>
        <div class="epoch-progress-bar">
          <div class="epoch-progress-fill" data-bind="epochProgressFill"></div>
        </div>
        <div class="epoch-progress-label muted small" data-bind="epochProgressLabel"></div>
      </div>
    </div>

    <div class="section-row">
      <h3 class="section-title" data-bind="listTitle" data-i18n="webapp_tracked_addresses">Tracked addresses</h3>
      <div class="section-actions">
        <button class="section-cta reorder" type="button" data-action="reorder" data-bind="reorderBtn" data-i18n="webapp_reorder_button" hidden>↕ Reorder</button>
        <button class="section-cta" type="button" data-action="add" data-bind="addBtn" data-i18n="webapp_add_button">+ Add</button>
      </div>
    </div>
    <p class="reorder-hint muted small" data-bind="reorderHint" data-i18n="webapp_reorder_hint" hidden>Drag the handles to reorder. Tap Done to save.</p>
    <div id="entries" class="card-list" data-bind="entries">
      <div class="placeholder" data-bind="placeholder" data-i18n="webapp_loading">Loading…</div>
    </div>
  </template>

  <template id="tpl-add">
    <div class="hero">
      <h2 class="hero-form-title" data-i18n="webapp_add_form_title">Add to tracking</h2>
      <p class="muted small" data-i18n="webapp_add_form_hint">
        Pick a role, paste the address, and (optionally) give it a label so it's easy to spot in the list.
      </p>
    </div>

    <h3 class="section-title" data-i18n="webapp_add_role_section">Role</h3>
    <div class="card form-card">
      <div class="seg-control" role="tablist" id="add-role-segment">
        <button type="button" class="seg-option" data-role="validator" role="tab" data-i18n="webapp_add_role_validator">Validator</button>
        <button type="button" class="seg-option" data-role="delegator" role="tab" data-i18n="webapp_add_role_delegator">Delegator</button>
      </div>
      <p class="muted small" data-bind="roleHint">—</p>
    </div>

    <h3 class="section-title" data-bind="addressesTitle" data-i18n="webapp_add_addresses_section">Addresses</h3>
    <div class="card form-card">
      <label class="row-label" data-bind="delegatorRow" hidden>
        <span data-i18n="webapp_add_delegator_label">Your delegator address</span>
        <input type="text" id="delegator-input" autocomplete="off" spellcheck="false" placeholder="0x..." />
      </label>
      <label class="row-label">
        <span data-bind="addressLabel" data-i18n="webapp_add_validator_label">Validator (staker) address</span>
        <input type="text" id="address-input" autocomplete="off" spellcheck="false" placeholder="0x..." />
      </label>
      <p class="form-error" id="add-error" hidden></p>
    </div>

    <h3 class="section-title" data-i18n="webapp_add_label_section">Label (optional)</h3>
    <div class="card form-card">
      <label class="row-label">
        <span data-i18n="webapp_add_label_label">Display name</span>
        <input type="text" id="label-input" maxlength="40" autocomplete="off" placeholder="" />
      </label>
      <p class="muted small" data-i18n="webapp_add_label_hint">Up to 40 characters. Stays local to your account.</p>
    </div>

    <button class="primary-btn" id="add-submit" data-i18n="webapp_add_submit_btn">Add to tracking</button>
    <p class="muted small center" id="add-status"></p>
  </template>

  <template id="tpl-detail">
    <div class="detail-head">
      <div class="avatar" data-bind="avatar">🛡</div>
      <div>
        <h2 data-bind="label" class="detail-label">—</h2>
        <div class="addr-mono muted" data-bind="address">—</div>
      </div>
    </div>

    <div data-bind="statusBanner"></div>

    <div data-bind="totalStakeBlock"></div>

    <div data-bind="operatorWalletBlock"></div>

    <div class="grid-2">
      <div class="stat">
        <div class="muted small" data-bind="primaryStakeLabel" data-i18n="webapp_stake_label">Stake</div>
        <div class="stat-value" data-bind="primaryStake">—</div>
        <div class="muted small" data-bind="primaryStakeUsd"></div>
      </div>
      <div class="stat">
        <div class="muted small" data-i18n="webapp_unclaimed_label">Unclaimed</div>
        <div class="stat-value" data-bind="unclaimed">—</div>
        <div class="muted small" data-bind="unclaimedUsd"></div>
      </div>
      <div class="stat" data-bind="commissionStat">
        <div class="muted small" data-i18n="webapp_commission_label">Commission</div>
        <div class="stat-value" data-bind="commission">—</div>
      </div>
      <div class="stat">
        <div class="muted small" data-i18n="webapp_epoch_label">Epoch</div>
        <div class="stat-value" data-bind="epoch">—</div>
      </div>
    </div>

    <div data-bind="poolsBlock"></div>
    <div data-bind="positionsBlock"></div>

    <button class="primary-btn destructive" data-bind="removeBtn" hidden>
      Remove from tracking
    </button>
  </template>

  <template id="tpl-settings">
    <div class="hero">
      <div class="muted small" data-i18n="webapp_settings_hero">Get notified when your unclaimed rewards cross the threshold below. Pick one mode — STRK amount or USD value.</div>
    </div>

    <h3 class="section-title" data-i18n="webapp_notification_mode_section">Notification mode</h3>
    <div class="card form-card">
      <div class="seg-control" role="tablist" id="mode-segment">
        <button type="button" class="seg-option" data-mode="off" role="tab" data-i18n="webapp_mode_off">Off</button>
        <button type="button" class="seg-option" data-mode="strk" role="tab" data-i18n="webapp_mode_strk">STRK</button>
        <button type="button" class="seg-option" data-mode="usd" role="tab" data-i18n="webapp_mode_usd">USD</button>
      </div>

      <div class="threshold-input" id="threshold-row" hidden>
        <label class="row-label">
          <span data-bind="amountLabel" data-i18n="webapp_threshold_label">Threshold</span>
          <div class="input-with-suffix">
            <span class="prefix" data-bind="prefix" hidden>$</span>
            <input type="number" min="0" step="any" id="amount-input" placeholder="0" />
            <span class="suffix" data-bind="suffix" hidden>STRK</span>
          </div>
        </label>
        <p class="muted small" data-bind="modeHint">—</p>
      </div>
    </div>

    <h3 class="section-title" data-i18n="webapp_op_balance_section">Operator wallet alert</h3>
    <div class="card form-card">
      <p class="muted small" data-i18n="webapp_op_balance_explainer">
        Get a DM when the operator wallet (the one signing attestations) drops below this STRK balance. Set to 0 to disable.
      </p>
      <label class="row-label">
        <span data-i18n="webapp_op_balance_min_label">Minimum STRK balance</span>
        <div class="input-with-suffix">
          <input type="number" min="0" step="any" id="op-balance-input" placeholder="0" />
          <span class="suffix">STRK</span>
        </div>
      </label>
    </div>

    <h3 class="section-title" data-i18n="webapp_language_section">Language</h3>
    <div class="card form-card">
      <label class="row-label">
        <span data-i18n="webapp_language_picker_label">Interface language</span>
        <select id="language-picker" class="lang-picker">
          <!-- options injected from SUPPORTED_LOCALES -->
        </select>
      </label>
    </div>

    <button class="primary-btn" id="save-settings" data-i18n="webapp_save_btn">Save</button>
    <p class="muted small center" id="settings-status"></p>
  </template>

  <script src="/app/app.js?v=20260430-3"></script>
</body>
</html>
